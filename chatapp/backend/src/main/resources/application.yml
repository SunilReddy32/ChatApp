spring:
  application:
    name: chatapp

  datasource:
    url: jdbc:mysql://localhost:3306/chatapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Krithi@2109

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_EMAIL@gmail.com
    password: YOUR_16CHAR_APP_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

app:
  jwt:
    secret: YourLongRandomSecretKeyHere123456789
    expiration-ms: 86400000

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

  file:
    storage: local
    local-path: ./uploads/
    s3-bucket: chatapp-files
    s3-region: ap-south-1
